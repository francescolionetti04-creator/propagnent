<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Password dimenticata — HouseRadar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='70' cy='70' r='20' fill='%235DCAA5'/><path d='M50 25 L25 50 V80 H75 V50 Z' fill='%23185FA5'/></svg>">
<style>
:root{--blue:#185FA5;--blue-d:#0F4275;--blue-l:#EDF4FC;--green-l:#E1F5EE;
  --off:#f5f5f3;--dark:#1a1a1a;--gray:#666;--border:#D3D1C7;--err:#C92E2E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
  background:var(--off);color:var(--dark);line-height:1.55;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:24px}
a{color:var(--blue);text-decoration:none}.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:24px;color:var(--blue);margin:24px 0 28px}
.brand svg{width:42px;height:42px}
.card{max-width:440px;width:100%;background:#fff;border-radius:18px;padding:40px;
  box-shadow:0 12px 40px rgba(0,0,0,.07);border:1px solid var(--border)}
h1{font-size:26px;font-weight:800;margin-bottom:8px}.sub{color:var(--gray);margin-bottom:22px;font-size:15px}
label{display:block;margin:14px 0 6px;font-size:13px;font-weight:600}
input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.btn{width:100%;padding:13px 24px;border-radius:10px;font-weight:600;font-size:15px;
  background:var(--blue);color:#fff;cursor:pointer;border:none;margin-top:22px}
.btn:hover{background:var(--blue-d)}.btn:disabled{opacity:.6}
.msg{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:14px;display:none}
.msg.ok{background:var(--green-l);color:#0E5E3F;display:block}
.msg.err{background:#FBE8E8;color:var(--err);display:block}
.alt{margin-top:18px;text-align:center;font-size:14px;color:var(--gray)}
</style>
</head>
<body>
<a href="/" class="brand">
  <svg viewBox="0 0 100 100" fill="none">
    <path d="M50 18 L20 45 V82 H80 V45 Z" fill="#185FA5"/>
    <circle cx="73" cy="73" r="14" fill="#5DCAA5"/><circle cx="73" cy="73" r="6" fill="#fff"/>
  </svg>HouseRadar
</a>
<div class="card">
  <h1>Password dimenticata?</h1>
  <p class="sub">Inserisci la tua email. Se l'account esiste, ti invieremo un link per reimpostare la password.</p>
  <form id="form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email">
    <button class="btn" id="btn" type="submit">Invia link di reset</button>
    <div class="msg" id="msg"></div>
  </form>
  <p class="alt"><a href="/accedi">← Torna al login</a></p>
</div>
<script>
const form=document.getElementById('form'),msg=document.getElementById('msg'),btn=document.getElementById('btn');
form.addEventListener('submit',async e=>{
  e.preventDefault();msg.className='msg';msg.textContent='';
  btn.disabled=true;btn.textContent='Invio…';
  try{
    const r=await fetch('/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:document.getElementById('email').value})});
    const j=await r.json();
    msg.className='msg ok';msg.textContent='✓ '+(j.message||'Controlla la tua email.');
  }catch(err){msg.className='msg err';msg.textContent='Errore: '+err.message}
  finally{btn.disabled=false;btn.textContent='Invia link di reset'}
});
</script>
</body></html>
