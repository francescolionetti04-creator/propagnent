<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registrati — HouseRadar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='70' cy='70' r='20' fill='%235DCAA5'/><path d='M50 25 L25 50 V80 H75 V50 Z' fill='%23185FA5'/></svg>">
<style>
:root{--blue:#185FA5;--blue-d:#0F4275;--blue-l:#EDF4FC;--green:#5DCAA5;--green-l:#E1F5EE;
  --off:#f5f5f3;--dark:#1a1a1a;--gray:#666;--border:#D3D1C7;--err:#C92E2E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
  background:var(--off);color:var(--dark);line-height:1.55;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:24px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:24px;color:var(--blue);margin:24px 0 28px}
.brand svg{width:42px;height:42px}
.card{max-width:560px;width:100%;background:#fff;border-radius:18px;padding:40px;
  box-shadow:0 12px 40px rgba(0,0,0,.07);border:1px solid var(--border)}
h1{font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.01em}
.sub{color:var(--gray);margin-bottom:24px;font-size:15px}
label{display:block;margin:14px 0 6px;font-size:13px;font-weight:600;color:#333}
input[type=text],input[type=email],input[type=tel],input[type=password]{
  width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;
  font-size:15px;font-family:inherit;transition:border .15s,box-shadow .15s;background:#fff}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.role-opt{
  position:relative;border:1.5px solid var(--border);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all .15s;font-size:14px}
.role-opt:hover{border-color:var(--blue)}
.role-opt input{position:absolute;opacity:0}
.role-opt.checked{border-color:var(--blue);background:var(--blue-l)}
.role-opt strong{display:block;font-weight:600;margin-bottom:2px}
.role-opt span{color:var(--gray);font-size:12px}
.btn{
  width:100%;display:inline-flex;align-items:center;justify-content:center;
  padding:13px 24px;border-radius:10px;font-weight:600;font-size:15px;
  background:var(--blue);color:#fff;cursor:pointer;border:none;
  margin-top:22px;transition:all .18s;font-family:inherit}
.btn:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 6px 16px rgba(24,95,165,.2)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alt{margin-top:18px;text-align:center;font-size:14px;color:var(--gray)}
.msg{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:14px;display:none}
.msg.ok{background:var(--green-l);color:#0E5E3F;display:block;border:1px solid var(--green)}
.msg.err{background:#FBE8E8;color:var(--err);display:block;border:1px solid var(--err)}
.tos{font-size:12px;color:var(--gray);margin-top:12px;text-align:center}
@media(max-width:520px){.row{grid-template-columns:1fr}.role-grid{grid-template-columns:1fr}.card{padding:28px 22px}}
</style>
</head>
<body>

<a href="/" class="brand">
  <svg viewBox="0 0 100 100" fill="none">
    <path d="M50 18 L20 45 V82 H80 V45 Z" fill="#185FA5"/>
    <circle cx="73" cy="73" r="14" fill="#5DCAA5"/>
    <circle cx="73" cy="73" r="6" fill="#fff"/>
  </svg>
  HouseRadar
</a>

<div class="card">
  <h1>Crea il tuo account</h1>
  <p class="sub">7 giorni di prova gratuita. Nessuna carta richiesta.</p>

  <form id="signupForm" novalidate>
    <div class="row">
      <div>
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" autocomplete="given-name">
      </div>
      <div>
        <label for="cognome">Cognome</label>
        <input type="text" id="cognome" name="cognome" autocomplete="family-name">
      </div>
    </div>

    <label for="email">Email *</label>
    <input type="email" id="email" name="email" required autocomplete="email">

    <div class="row">
      <div>
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
      </div>
      <div>
        <label for="password2">Conferma password *</label>
        <input type="password" id="password2" name="password2" required minlength="8" autocomplete="new-password">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="telefono">Telefono</label>
        <input type="tel" id="telefono" name="telefono" autocomplete="tel">
      </div>
      <div>
        <label for="city">Città</label>
        <input type="text" id="city" name="city" placeholder="es. Livorno" autocomplete="address-level2">
      </div>
    </div>

    <label>Tipo di account *</label>
    <div class="role-grid">
      <label class="role-opt">
        <input type="radio" name="role" value="agente" required>
        <strong>Agente Immobiliare</strong>
        <span>Trova nuovi mandati</span>
      </label>
      <label class="role-opt">
        <input type="radio" name="role" value="consulente">
        <strong>Consulente</strong>
        <span>Stessa dashboard agente</span>
      </label>
      <label class="role-opt">
        <input type="radio" name="role" value="privato">
        <strong>Privato</strong>
        <span>Vendo casa</span>
      </label>
      <label class="role-opt">
        <input type="radio" name="role" value="compratore">
        <strong>Compratore</strong>
        <span>Cerco casa</span>
      </label>
    </div>

    <button type="submit" class="btn" id="submitBtn">Registrati gratis</button>
    <div class="msg" id="msg"></div>
    <p class="tos">Cliccando accetti i nostri <a href="/termini">Termini</a> e la <a href="/privacy">Privacy</a>.</p>
  </form>

  <p class="alt">Hai già un account? <a href="/accedi">Accedi</a></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const presetRole = params.get('role');
if (presetRole) {
  const r = document.querySelector(`input[name=role][value="${presetRole}"]`);
  if (r) { r.checked = true; r.parentElement.classList.add('checked'); }
}

document.querySelectorAll('.role-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.role-opt').forEach(o => o.classList.remove('checked'));
    opt.classList.add('checked');
    opt.querySelector('input').checked = true;
  });
});

const form = document.getElementById('signupForm');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg'; msg.textContent = '';

  const data = Object.fromEntries(new FormData(form).entries());
  if (data.password !== data.password2) {
    msg.className = 'msg err'; msg.textContent = 'Le password non coincidono.'; return;
  }
  if (!data.role) {
    msg.className = 'msg err'; msg.textContent = 'Seleziona un tipo di account.'; return;
  }
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(data.email)) {
    msg.className = 'msg err'; msg.textContent = 'Email non valida.'; return;
  }
  delete data.password2;

  btn.disabled = true; btn.textContent = 'Registrazione…';
  try {
    const resp = await fetch('/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.detail || 'Errore registrazione');
    msg.className = 'msg ok';
    msg.innerHTML = '✓ ' + (json.message || 'Controlla la tua email per attivare l\'account.');
    form.reset();
  } catch (err) {
    msg.className = 'msg err'; msg.textContent = err.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Registrati gratis';
  }
});
</script>
</body>
</html>
