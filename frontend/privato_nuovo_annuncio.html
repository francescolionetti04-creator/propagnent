<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nuovo annuncio — HouseRadar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='70' cy='70' r='20' fill='%235DCAA5'/><path d='M50 25 L25 50 V80 H75 V50 Z' fill='%23185FA5'/></svg>">
<style>
:root{--blue:#185FA5;--blue-d:#0F4275;--blue-l:#EDF4FC;--green:#5DCAA5;--green-l:#E1F5EE;
  --off:#f5f5f3;--dark:#1a1a1a;--gray:#666;--border:#D3D1C7;--err:#C92E2E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
  background:var(--off);color:var(--dark);line-height:1.55;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:24px}
a{color:var(--blue);text-decoration:none}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:22px;color:var(--blue);margin:24px 0 24px}
.brand svg{width:36px;height:36px}
.card{max-width:680px;width:100%;background:#fff;border-radius:18px;padding:40px 36px;
  box-shadow:0 12px 40px rgba(0,0,0,.07);border:1px solid var(--border)}
h1{font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.01em}
.sub{color:var(--gray);margin-bottom:24px}
label{display:block;margin:14px 0 6px;font-size:13px;font-weight:600;color:#333}
input,select,textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;
  font-size:15px;font-family:inherit;background:#fff;transition:all .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
textarea{resize:vertical;min-height:90px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.opt-grid.urg{grid-template-columns:repeat(3,1fr)}
.opt{position:relative;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;
  cursor:pointer;transition:all .15s;font-size:14px;text-align:center}
.opt:hover{border-color:var(--blue)}
.opt input{position:absolute;opacity:0}
.opt.checked{border-color:var(--blue);background:var(--blue-l);color:var(--blue);font-weight:600}
.opt.urg-alta.checked{border-color:#EF9F27;background:#FFF7E8;color:#A45F12}
.opt.urg-bassa.checked{border-color:#5DCAA5;background:var(--green-l);color:#1D9E75}
.btn{width:100%;padding:14px 24px;border-radius:10px;font-weight:600;font-size:15px;
  background:var(--blue);color:#fff;cursor:pointer;border:none;margin-top:24px;
  transition:all .18s;font-family:inherit}
.btn:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 6px 16px rgba(24,95,165,.2)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:14px;display:none}
.msg.ok{background:var(--green-l);color:#0E5E3F;display:block}
.msg.err{background:#FBE8E8;color:var(--err);display:block}
.back{display:inline-block;margin-top:14px;font-size:14px;color:var(--gray)}
.back:hover{color:var(--blue);text-decoration:underline}
@media (max-width:600px){.row,.row3,.opt-grid{grid-template-columns:1fr}.card{padding:28px 22px}}
</style>
</head>
<body>

<a href="/" class="brand">
  <svg viewBox="0 0 100 100" fill="none">
    <path d="M50 18 L20 45 V82 H80 V45 Z" fill="#185FA5"/>
    <circle cx="73" cy="73" r="14" fill="#5DCAA5"/><circle cx="73" cy="73" r="6" fill="#fff"/>
  </svg>HouseRadar
</a>

<div class="card">
  <h1>Inserisci il tuo annuncio</h1>
  <p class="sub">I dati saranno visibili agli agenti della tua provincia. Il telefono solo a chi ti contatta.</p>

  <form id="form" novalidate>
    <label for="indirizzo">Indirizzo *</label>
    <input type="text" id="indirizzo" name="indirizzo" required placeholder="Via Roma 14">

    <div class="row">
      <div>
        <label for="citta">Città *</label>
        <input type="text" id="citta" name="citta" required placeholder="Livorno">
      </div>
      <div>
        <label for="provincia">Provincia *</label>
        <select id="provincia" name="provincia" required>
          <option value="">Seleziona...</option>
          <option value="Livorno">Livorno</option>
          <option value="Pisa">Pisa</option>
          <option value="Firenze">Firenze</option>
          <option value="Siena">Siena</option>
          <option value="Arezzo">Arezzo</option>
          <option value="Lucca">Lucca</option>
          <option value="Grosseto">Grosseto</option>
          <option value="Pistoia">Pistoia</option>
          <option value="Prato">Prato</option>
          <option value="Massa-Carrara">Massa-Carrara</option>
        </select>
      </div>
    </div>

    <label>Tipo di immobile *</label>
    <div class="opt-grid">
      <label class="opt"><input type="radio" name="tipo_immobile" value="appartamento" required>Appartamento</label>
      <label class="opt"><input type="radio" name="tipo_immobile" value="villa">Villa</label>
      <label class="opt"><input type="radio" name="tipo_immobile" value="attico">Attico</label>
      <label class="opt"><input type="radio" name="tipo_immobile" value="loft">Loft</label>
      <label class="opt"><input type="radio" name="tipo_immobile" value="monolocale">Monolocale</label>
      <label class="opt"><input type="radio" name="tipo_immobile" value="altro">Altro</label>
    </div>

    <div class="row3">
      <div>
        <label for="mq">Superficie (m²)</label>
        <input type="number" id="mq" name="mq" min="10" max="5000">
      </div>
      <div>
        <label for="camere">Camere</label>
        <input type="number" id="camere" name="camere" min="0" max="20">
      </div>
      <div>
        <label for="bagni">Bagni</label>
        <input type="number" id="bagni" name="bagni" min="0" max="20">
      </div>
    </div>

    <label for="prezzo_richiesto">Prezzo richiesto (€)</label>
    <input type="number" id="prezzo_richiesto" name="prezzo_richiesto" min="1000" max="50000000" placeholder="es. 250000">

    <label for="descrizione">Descrizione</label>
    <textarea id="descrizione" name="descrizione" placeholder="Stato, esposizione, note..."></textarea>

    <label>Urgenza vendita</label>
    <div class="opt-grid urg">
      <label class="opt urg-alta"><input type="radio" name="urgenza" value="alta">Alta</label>
      <label class="opt urg-media"><input type="radio" name="urgenza" value="media" checked>Media</label>
      <label class="opt urg-bassa"><input type="radio" name="urgenza" value="bassa">Bassa</label>
    </div>

    <button type="submit" class="btn" id="btn">Pubblica annuncio</button>
    <div class="msg" id="msg"></div>
  </form>
  <a href="/privato/dashboard" class="back">← Torna alla dashboard</a>
</div>

<script>
// pre-select urgenza media
document.querySelectorAll('input[name="urgenza"]').forEach(r => {
  if (r.checked) r.parentElement.classList.add('checked');
});
// radio button visual feedback
document.querySelectorAll('.opt').forEach(opt => {
  opt.addEventListener('click', () => {
    const name = opt.querySelector('input').name;
    document.querySelectorAll(`.opt input[name="${name}"]`).forEach(i => i.parentElement.classList.remove('checked'));
    opt.classList.add('checked');
    opt.querySelector('input').checked = true;
  });
});

const form = document.getElementById('form'), msg = document.getElementById('msg'), btn = document.getElementById('btn');
form.addEventListener('submit', async e => {
  e.preventDefault();
  msg.className = 'msg'; msg.textContent = '';
  const data = Object.fromEntries(new FormData(form).entries());
  // numerici
  ['mq','camere','bagni','prezzo_richiesto'].forEach(k => { if (data[k] === '') delete data[k]; else data[k] = parseInt(data[k], 10); });

  if (!data.tipo_immobile) { msg.className = 'msg err'; msg.textContent = 'Seleziona il tipo di immobile.'; return; }
  if (!data.provincia)     { msg.className = 'msg err'; msg.textContent = 'Seleziona la provincia.'; return; }

  btn.disabled = true; btn.textContent = 'Pubblicazione…';
  try {
    const r = await fetch('/api/privato/lead', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.detail || 'Errore creazione');
    msg.className = 'msg ok'; msg.textContent = '✓ Annuncio pubblicato!';
    setTimeout(() => location.href = '/privato/dashboard?created=1', 600);
  } catch (err) {
    msg.className = 'msg err'; msg.textContent = err.message;
    btn.disabled = false; btn.textContent = 'Pubblica annuncio';
  }
});
</script>
</body></html>
