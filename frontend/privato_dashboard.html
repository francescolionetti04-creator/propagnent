<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La mia dashboard — HouseRadar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='70' cy='70' r='20' fill='%235DCAA5'/><path d='M50 25 L25 50 V80 H75 V50 Z' fill='%23185FA5'/></svg>">
<style>
:root{--blue:#185FA5;--blue-d:#0F4275;--blue-l:#EDF4FC;--green:#5DCAA5;--green-l:#E1F5EE;
  --off:#f5f5f3;--dark:#1a1a1a;--gray:#666;--border:#D3D1C7;--err:#C92E2E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
  background:linear-gradient(180deg,var(--off) 0%,#fff 320px);color:var(--dark);line-height:1.55;min-height:100vh;padding:24px}
a{color:var(--blue);text-decoration:none}
.wrap{max-width:980px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:16px 20px;margin-bottom:24px;box-shadow:0 4px 12px rgba(0,0,0,.05);flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;color:var(--blue)}
.brand svg{width:30px;height:30px}
.user-bar{display:flex;align-items:center;gap:10px;font-size:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:10px;
  font-weight:600;font-size:14px;background:var(--blue);color:#fff;cursor:pointer;border:none;
  transition:all .18s;font-family:inherit;text-decoration:none}
.btn:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 6px 16px rgba(24,95,165,.2)}
.btn-out{background:#fff;color:var(--blue);border:1px solid var(--blue)}
.btn-out:hover{background:var(--blue-l)}
.btn-warn{background:#fff;color:#A45F12;border:1px solid #EF9F27}
.btn-warn:hover{background:#FFF7E8}
.btn-dang{background:#fff;color:var(--err);border:1px solid var(--err)}
.btn-dang:hover{background:#FBE8E8}

h1{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-.01em}
.sub{color:var(--gray);margin-bottom:24px}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:26px 28px;
  margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.05)}
.empty{text-align:center;padding:64px 32px}
.empty .ico{font-size:54px;margin-bottom:18px}
.empty h2{font-size:22px;margin-bottom:10px}
.empty p{color:var(--gray);margin-bottom:24px}

.lead-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:14px 0 24px}
.lead-fld{background:var(--off);padding:12px 14px;border-radius:10px}
.lead-fld .l{font-size:11px;color:var(--gray);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.lead-fld .v{font-size:16px;font-weight:700}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

.urg{display:inline-block;padding:3px 10px;font-size:12px;font-weight:700;border-radius:6px;letter-spacing:.04em;text-transform:uppercase}
.urg-alta{background:#FFF7E8;color:#A45F12;border:1px solid #EF9F27}
.urg-media{background:var(--blue-l);color:var(--blue)}
.urg-bassa{background:var(--green-l);color:#1D9E75}
.status-pill{display:inline-block;padding:3px 10px;font-size:12px;font-weight:700;border-radius:6px;
  background:var(--green-l);color:#1D9E75;letter-spacing:.04em}

.contatti{margin-top:8px}
.contatto{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;
  border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:#fff}
.contatto .who strong{display:block;font-size:15px}
.contatto .who span{color:var(--gray);font-size:13px}
.contatto .when{font-size:12px;color:var(--gray)}

.flash{background:var(--green-l);color:#0E5E3F;padding:11px 14px;border-radius:10px;margin-bottom:18px;border:1px solid var(--green)}
@media (max-width:768px){
  body{padding:14px}
  .topbar{flex-direction:column;align-items:flex-start;padding:14px 16px}
  .card{padding:18px 16px}
  h1{font-size:22px}
  .lead-grid{grid-template-columns:1fr 1fr;gap:10px}
  .lead-fld{padding:10px 12px}
  .lead-fld .v{font-size:14px}
  .actions{flex-direction:column}
  .actions .btn{width:100%;min-height:42px}
  .contatto{flex-direction:column;align-items:flex-start;gap:6px}
}
@media (max-width:420px){
  .lead-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a href="/" class="brand">
      <svg viewBox="0 0 100 100" fill="none">
        <path d="M50 18 L20 45 V82 H80 V45 Z" fill="#185FA5"/>
        <circle cx="73" cy="73" r="14" fill="#5DCAA5"/><circle cx="73" cy="73" r="6" fill="#fff"/>
      </svg>HouseRadar
    </a>
    <div class="user-bar">
      <span id="user-name" style="font-weight:600;color:var(--blue)"></span>
      <button class="btn btn-out" onclick="logoutHr()">Esci</button>
    </div>
  </div>

  <h1>La mia dashboard</h1>
  <p class="sub">Gestisci il tuo annuncio e vedi gli agenti che ti hanno cercato.</p>

  <div id="flash" class="flash" style="display:none"></div>

  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
if (params.get('created') === '1') {
  const f = document.getElementById('flash');
  f.style.display = ''; f.textContent = '✓ Annuncio pubblicato! Gli agenti della tua provincia possono già vederlo.';
}

async function logoutHr(){
  await fetch('/auth/logout', {method:'POST', credentials:'include'});
  location.href = '/';
}

function fmtPrezzo(p){ return p ? '€ ' + p.toLocaleString('it-IT') : '—'; }
function fmtData(iso){ try { return new Date(iso).toLocaleString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch { return iso; } }

async function load(){
  // user info
  try {
    const meR = await fetch('/api/me', {credentials:'include'});
    const me  = (await meR.json()).user;
    if (me && me.nome) document.getElementById('user-name').textContent = me.nome;
    else if (me) document.getElementById('user-name').textContent = me.email;
  } catch {}

  // lead + contatti
  const c = document.getElementById('content');
  try {
    const [leadR, conR] = await Promise.all([
      fetch('/api/privato/me/lead', {credentials:'include'}).then(r=>r.json()),
      fetch('/api/privato/me/contatti', {credentials:'include'}).then(r=>r.json()),
    ]);
    if (!leadR.lead) {
      c.innerHTML = `
        <div class="card empty">
          <div class="ico">🏠</div>
          <h2>Non hai ancora un annuncio attivo</h2>
          <p>Crea il tuo annuncio in 1 minuto. Gli agenti della tua zona ti contatteranno.</p>
          <a class="btn" href="/privato/nuovo-annuncio">Crea ora</a>
        </div>`;
      return;
    }
    const l = leadR.lead;
    const urgClass = 'urg-' + (l.urgenza || 'media');
    c.innerHTML = `
      <div class="card">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
          <span class="status-pill">● ${l.status}</span>
          <span class="urg ${urgClass}">Urgenza ${l.urgenza || 'media'}</span>
        </div>
        <h2 style="font-size:22px;margin:6px 0 4px">${l.indirizzo}</h2>
        <div style="color:var(--gray);font-size:14px">${l.citta} (${l.provincia}) · ${l.tipo_immobile || 'immobile'}</div>
        <div class="lead-grid">
          <div class="lead-fld"><div class="l">Prezzo</div><div class="v">${fmtPrezzo(l.prezzo_richiesto)}</div></div>
          <div class="lead-fld"><div class="l">Superficie</div><div class="v">${l.mq ? l.mq + ' m²' : '—'}</div></div>
          <div class="lead-fld"><div class="l">Camere</div><div class="v">${l.camere ?? '—'}</div></div>
          <div class="lead-fld"><div class="l">Bagni</div><div class="v">${l.bagni ?? '—'}</div></div>
        </div>
        ${l.descrizione ? `<p style="color:#444;font-size:14px;margin:12px 0">${l.descrizione}</p>` : ''}
        <div class="actions">
          <a class="btn btn-out" href="/privato/nuovo-annuncio">Modifica annuncio</a>
          <button class="btn btn-warn" onclick="cambiaStatus(${l.id}, 'venduto')">Segna come venduto</button>
          <button class="btn btn-dang" onclick="cambiaStatus(${l.id}, 'ritira')">Ritira annuncio</button>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size:18px;margin-bottom:14px">📞 Agenti che ti hanno contattato (${conR.contatti.length})</h3>
        ${conR.contatti.length === 0 ? `
          <p style="color:var(--gray)">Nessun agente ti ha ancora cercato. Quando lo faranno, riceverai una mail e li vedrai qui.</p>
        ` : `
          <div class="contatti">
            ${conR.contatti.map(co => `
              <div class="contatto">
                <div class="who">
                  <strong>${co.agente_nome || co.agente_email}${co.agente_cognome ? ' ' + co.agente_cognome : ''}</strong>
                  <span>${co.agente_city || '—'} · ${co.agente_telefono || co.agente_email}</span>
                </div>
                <div class="when">${fmtData(co.contattato_at)}</div>
              </div>`).join('')}
          </div>
        `}
      </div>`;
  } catch (e) {
    c.innerHTML = `<div class="card"><p style="color:var(--err)">Errore caricamento: ${e.message}</p></div>`;
  }
}

async function cambiaStatus(id, action) {
  if (!confirm('Sei sicuro?')) return;
  const path = action === 'venduto' ? 'marca-venduto' : 'ritira';
  const r = await fetch(`/api/privato/lead/${id}/${path}`, {method:'POST', credentials:'include'});
  if (r.ok) location.reload();
  else alert('Errore: ' + (await r.json()).detail);
}

load();
</script>
</body></html>
